name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup Postern
        run: make setup
      - name: Start Postern headlessly
        run: make start-headless
      - name: Health Check
        run: |
          curl -fsS http://localhost:8422/health
          make status
      - name: Run Smalltalk tests
        run: make test
      - name: Stop Postern
        if: always()
        run: make stop
